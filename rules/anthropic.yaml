#       路由到同一代理出口,避免 IP 漂移触发 Sift / Datadog 风控。
#
# 兼容: Mihomo (Clash Meta) / Stash / ClashX Pro
# 注意: 包含 IP-ASN 规则,经典 Clash Premium 不支持。
#
# 维护: kk66615
# 更新: 2026-04-14

payload:
